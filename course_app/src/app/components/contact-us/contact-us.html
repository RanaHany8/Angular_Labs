<div class="contact-wrapper py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold text-dark">Get In <span class="text-primary">Touch</span></h1>
      <p class="text-muted">Have a question or stay in touch? We'd love to hear from you.</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="contact-info-card p-5 text-white h-100">
          <h3 class="mb-4">Contact Information</h3>
          <p class="opacity-75 mb-5">Fill out the form and our team will get back to you within 24 hours.</p>
          
          <div class="d-flex align-items-center mb-4">
            <div class="icon-box me-3"><i class="bi bi-geo-alt-fill"></i></div>
            <span>123 Tech Street, Port Said, Egypt</span>
          </div>

          <div class="d-flex align-items-center mb-4">
            <div class="icon-box me-3"><i class="bi bi-envelope-fill"></i></div>
            <span>support@rana-academy.com</span>
          </div>

          <div class="d-flex align-items-center mb-5">
            <div class="icon-box me-3"><i class="bi bi-telephone-fill"></i></div>
            <span>+20 123 456 789</span>
          </div>

          <div class="social-links d-flex gap-3 mt-auto">
            <a href="#" class="social-icon"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social-icon"><i class="bi bi-linkedin"></i></a>
            <a href="#" class="social-icon"><i class="bi bi-github"></i></a>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="form-card p-5 bg-white shadow-sm border-0 h-100">
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control custom-input" placeholder="Rana Hany">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control custom-input" placeholder="name@example.com">
              </div>
              <div class="col-12">
                <label class="form-label fw-bold">Subject</label>
                <input type="text" class="form-control custom-input" placeholder="How can we help?">
              </div>
              <div class="col-12">
                <label class="form-label fw-bold">Message</label>
                <textarea class="form-control custom-input" rows="5" placeholder="Write your message here..."></textarea>
              </div>
              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">Send Message</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
