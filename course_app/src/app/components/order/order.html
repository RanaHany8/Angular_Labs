<div class="container mt-4">
  <label class="fw-bold mb-2">Select Category:</label>
  
  <select class="form-control" [(ngModel)]="selectedCatId">
    <option value="0">All Categories</option>
    
    @for (cat of categories; track cat.id) {
      <option [value]="cat.id">{{ cat.name }}</option>
    }
  </select>

  <hr>

  <app-courses 
    [selectedCatId]="selectedCatId" 
    (totalPriceChanged)="onPriceChanged($event)">
  </app-courses>

  <div class="mt-3 alert alert-info shadow-sm">
    <strong>Total Price in Order:</strong> {{ totalPriceFromChild | currency:'EGP ' }}
  </div>
</div>
