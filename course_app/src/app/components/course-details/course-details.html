<div class="container mt-5">
  <div *ngIf="course; else loading">
    <div class="card shadow-lg border-0">
      <img [src]="course?.image" class="card-img-top" [alt]="course?.title" style="height: 350px; object-fit: cover;">
      <div class="card-body p-4">
        <h1 class="display-5 fw-bold">{{ course?.title }}</h1>
        <p class="lead text-muted">Instructor: {{ course?.instructor }}</p>
        <div class="row bg-light p-3 rounded">
          <div class="col-md-6">
            <h4 class="text-success">Price: {{ course?.price | currency:'EGP ' }}</h4>
          </div>
          <div class="col-md-6">
            <h4 class="text-primary">Seats: {{ course?.seats }}</h4>
          </div>
        </div>
        <button class="btn btn-secondary mt-4" routerLink="/courses">Back to Courses</button>
      </div>
    </div>
  </div>

  <ng-template #loading>
    <div class="text-center p-5">
      <div class="spinner-border text-primary" role="status"></div>
      <h3 class="mt-3">Loading Course Data...</h3>
    </div>
  </ng-template>
</div>
