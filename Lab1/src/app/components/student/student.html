<div class="container mt-5">
  <h2 class="text-center mb-4 text-primary">Student List</h2>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let std of students">
      <div class="card h-100 shadow-sm border-0">
        <img [src]="std.photoUrl" class="card-img-top img-fluid" [alt]="std.name" style="height: 200px; object-fit: cover;">
        
        <div class="card-body">
          <h5 class="card-title fw-bold">{{ std.name }}</h5>
          <p class="card-text text-muted">Student ID: #{{ std.id }}</p>
          <p class="card-text">Age: <span class="badge bg-info text-dark">{{ std.age }}</span></p>
        </div>
        
        <div class="card-footer bg-white border-0 pb-3">
          <button class="btn btn-outline-primary w-100">View Profile</button>
        </div>
      </div>
    </div>
  </div>
</div>
